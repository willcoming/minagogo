name: Patch info window Pages assets

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-info-window.yml

permissions:
  contents: write

jobs:
  patch-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Patch bundled assets
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const jsInput = 'assets/index-CCBj6HGg.js';
          const cssInput = 'assets/index-D7Cba5J2.css';
          const jsOutput = 'assets/index-info-window-380e82f.js';
          const cssOutput = 'assets/index-info-window-380e82f.css';

          const oldJs = 'function sh(a){const i=document.createElement("div");i.className="place-info-window";const u=document.createElement("h2");u.className="place-info-title";const c=document.createElement("span");c.className="place-info-title-category",c.textContent=a.category.label;const d=document.createElement("span");d.className="place-info-title-name",d.textContent=a.name,u.append(c,d);const h=document.createElement("p");h.className="place-info-meta",h.textContent=`頻道：${Lc(a)}`;const v=document.createElement("div");return v.className="place-info-actions",v.append(bi(Mc(a),"Google Maps"),bi(bd(a),"路線"),bi(uh(a),"評論")),i.append(u,h,v),i}';
          const newJs = 'function sh(a){const i=document.createElement("div");i.className="place-info-window";const u=document.createElement("h2");u.className="place-info-title",u.textContent=`${a.category.label} ${a.name}`;const c=document.createElement("p");c.className="place-info-meta",c.textContent=`頻道：${Lc(a)}`;const d=document.createElement("div");return d.className="place-info-actions",d.append(bi(Mc(a),"地圖"),bi(bd(a),"路線"),bi(uh(a),"評論")),i.append(u,c,d),i}';

          const oldCss = '.place-info-window{display:grid;width:min(286px,calc(100vw - 72px));gap:6px;padding:1px 1px 2px 0;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.place-info-title{display:flex;align-items:baseline;gap:6px;margin:0;padding-right:18px;color:var(--text);font-size:.96rem;line-height:1.22;letter-spacing:0}.place-info-title-category{flex:none;color:var(--accent-dark);font-size:.7rem;font-weight:800}.place-info-title-name{min-width:0;font-weight:800}.place-info-meta{display:-webkit-box;overflow:hidden;color:var(--text-muted);font-size:.76rem;line-height:1.35;-webkit-box-orient:vertical;-webkit-line-clamp:2}.place-info-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;padding-top:1px}.place-info-actions a{display:inline-flex;align-items:center;justify-content:center;min-height:25px;padding:0 5px;border:1px solid var(--line);border-radius:5px;background:#fbfcfd;color:var(--text);font-size:.69rem;font-weight:800;line-height:1.1;text-align:center;text-decoration:none}.place-info-actions a:hover{border-color:var(--accent);color:var(--accent-dark)}';
          const newCss = '.place-info-window{display:grid;width:min(252px,calc(100vw - 72px));gap:4px;padding:0 0 1px;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.place-info-title{margin:0;padding-right:18px;color:var(--text);font-size:.86rem;font-weight:800;line-height:1.22;letter-spacing:0}.place-info-meta{display:-webkit-box;overflow:hidden;color:var(--text-muted);font-size:.7rem;line-height:1.35;-webkit-box-orient:vertical;-webkit-line-clamp:2}.place-info-actions{display:flex;gap:3px;padding-top:0}.place-info-actions a{display:inline-flex;align-items:center;justify-content:center;min-height:20px;padding:0 5px;border:1px solid var(--line);border-radius:4px;background:#fbfcfd;color:var(--text);font-size:.64rem;font-weight:800;line-height:1.1;text-align:center;text-decoration:none}.place-info-actions a:hover{border-color:var(--accent);color:var(--accent-dark)}';

          let js = fs.readFileSync(jsInput, 'utf8');
          if (!js.includes(oldJs)) {
            throw new Error('Expected info window JS block not found');
          }
          js = js.replace(oldJs, newJs);
          fs.writeFileSync(jsOutput, js);

          let css = fs.readFileSync(cssInput, 'utf8');
          if (!css.includes(oldCss)) {
            throw new Error('Expected info window CSS block not found');
          }
          css = css.replace(oldCss, newCss);
          fs.writeFileSync(cssOutput, css);

          let html = fs.readFileSync('index.html', 'utf8');
          html = html
            .replace('/minagogo/assets/index-CCBj6HGg.js', `/minagogo/${jsOutput}`)
            .replace('/minagogo/assets/index-D7Cba5J2.css', `/minagogo/${cssOutput}`);
          fs.writeFileSync('index.html', html);
          NODE

      - name: Commit Pages patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/index-info-window-380e82f.js assets/index-info-window-380e82f.css
          if git diff --cached --quiet; then
            echo "No Pages changes to publish"
          else
            git commit -m "Publish compact info window assets"
            git push origin gh-pages
          fi
